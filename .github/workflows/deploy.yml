name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Trust host
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          port="${SERVER_PORT:-22}"
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 20 -p "$port" "$SERVER_HOST" >> ~/.ssh/known_hosts; then
              exit 0
            fi
            echo "ssh-keyscan failed on attempt $attempt; retrying..."
            sleep 10
          done
          echo "Unable to trust SSH host on port $port"
          exit 1

      - name: Deploy files
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          port="${SERVER_PORT:-22}"
          sshpass -e rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude "node_modules" \
            --exclude "android-sdk" \
            --exclude "jdk8" \
            --exclude "*.zip" \
            --exclude "*.apk" \
            --exclude "android/.gradle" \
            --exclude "android/.gradle-local" \
            --exclude "android/app/build" \
            --exclude "android/local.properties" \
            --exclude ".deploy-tmp" \
            -e "ssh -p $port" \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Install and restart
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          port="${SERVER_PORT:-22}"
          sshpass -e ssh -p "$port" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'EOF'
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            npm ci --omit=dev
            if command -v pm2 >/dev/null 2>&1; then
              pm2 startOrReload ecosystem.config.cjs --env production
              pm2 save
            else
              npm install -g pm2
              pm2 startOrReload ecosystem.config.cjs --env production
              pm2 save
            fi
          EOF
